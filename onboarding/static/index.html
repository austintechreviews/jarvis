<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS Setup - Professional Onboarding</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @keyframes pulse-ring {
            0% { transform: scale(0.8); opacity: 0.5; }
            100% { transform: scale(1.3); opacity: 0; }
        }
        .animate-pulse-ring::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: inherit;
            animation: pulse-ring 2s cubic-bezier(0.215, 0.61, 0.355, 1) infinite;
        }
    </style>
</head>
<body class="bg-gradient-to-br from-slate-900 via-blue-900 to-slate-900 min-h-screen">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;
        const API_URL = 'http://localhost:5000/api';

        // Icon components
        const Mic = () => <i data-lucide="mic"></i>;
        const Check = () => <i data-lucide="check"></i>;
        const ArrowRight = () => <i data-lucide="arrow-right"></i>;
        const ArrowLeft = () => <i data-lucide="arrow-left"></i>;
        const Volume2 = () => <i data-lucide="volume-2"></i>;
        const User = () => <i data-lucide="user"></i>;
        const Zap = () => <i data-lucide="zap"></i>;
        const Shield = () => <i data-lucide="shield"></i>;
        const Music = () => <i data-lucide="music"></i>;
        const CloudSun = () => <i data-lucide="cloud-sun"></i>;
        const Mail = () => <i data-lucide="mail"></i>;

        function OnboardingUI() {
            const [currentStep, setCurrentStep] = useState(1);
            const [config, setConfig] = useState({
                userName: '',
                voiceProfile: null,
                jarvisVoice: 'en-GB-RyanNeural',
                wakeWord: 'hey jarvis',
                sensitivity: 0.5,
                plugins: {}
            });
            
            const [isRecording, setIsRecording] = useState(false);
            const [recordedSamples, setRecordedSamples] = useState([]);
            const [availableVoices, setAvailableVoices] = useState([]);
            
            const mediaRecorderRef = useRef(null);
            const audioChunksRef = useRef([]);

            useEffect(() => {
                fetchAvailableVoices();
                lucide.createIcons();
            }, []);

            useEffect(() => {
                lucide.createIcons();
            }, [currentStep, config, recordedSamples]);

            const fetchAvailableVoices = async () => {
                try {
                    const response = await fetch(`${API_URL}/onboarding/voices/list`);
                    const data = await response.json();
                    setAvailableVoices(data.voices || []);
                } catch (error) {
                    console.error('Failed to fetch voices:', error);
                }
            };

            const startRecording = async () => {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    const mediaRecorder = new MediaRecorder(stream);
                    mediaRecorderRef.current = mediaRecorder;
                    audioChunksRef.current = [];

                    mediaRecorder.ondataavailable = (event) => {
                        audioChunksRef.current.push(event.data);
                    };

                    mediaRecorder.onstop = async () => {
                        const audioBlob = new Blob(audioChunksRef.current, { type: 'audio/wav' });
                        await uploadVoiceSample(audioBlob);
                        stream.getTracks().forEach(track => track.stop());
                    };

                    mediaRecorder.start();
                    setIsRecording(true);
                } catch (error) {
                    console.error('Recording error:', error);
                    alert('Microphone access denied');
                }
            };

            const stopRecording = () => {
                if (mediaRecorderRef.current && isRecording) {
                    mediaRecorderRef.current.stop();
                    setIsRecording(false);
                }
            };

            const uploadVoiceSample = async (audioBlob) => {
                try {
                    const reader = new FileReader();
                    reader.readAsDataURL(audioBlob);
                    reader.onloadend = async () => {
                        const base64Audio = reader.result.split(',')[1];
                        
                        const response = await fetch(`${API_URL}/onboarding/voice-profile/record`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                audio: base64Audio,
                                phrase_id: recordedSamples.length + 1,
                                user_name: config.userName
                            })
                        });

                        const data = await response.json();
                        if (data.success) {
                            setRecordedSamples([...recordedSamples, {
                                id: data.sample_id,
                                quality: data.quality_score
                            }]);
                        }
                    };
                } catch (error) {
                    console.error('Upload error:', error);
                }
            };

            const trainVoiceProfile = async () => {
                try {
                    const response = await fetch(`${API_URL}/onboarding/voice-profile/train`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            user_name: config.userName
                        })
                    });

                    const data = await response.json();
                    if (data.success) {
                        setConfig({ ...config, voiceProfile: data.profile_id });
                        setCurrentStep(3);
                    }
                } catch (error) {
                    console.error('Training error:', error);
                }
            };

            const playVoicePreview = async (voiceId) => {
                try {
                    const response = await fetch(`${API_URL}/onboarding/voices/preview`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            voice_id: voiceId,
                            text: "Hello! I am JARVIS, your personal assistant. How may I help you today?"
                        })
                    });

                    const data = await response.json();
                    if (data.success) {
                        const audio = new Audio(`data:audio/mp3;base64,${data.audio}`);
                        audio.play();
                    }
                } catch (error) {
                    console.error('Preview error:', error);
                }
            };

            const saveConfiguration = async () => {
                try {
                    const response = await fetch(`${API_URL}/onboarding/config/save`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(config)
                    });

                    const data = await response.json();
                    if (data.success) {
                        alert('Configuration saved! JARVIS is ready.');
                        window.close();
                    }
                } catch (error) {
                    console.error('Save error:', error);
                }
            };

            const renderStep = () => {
                switch (currentStep) {
                    case 1:
                        return <WelcomeStep onNext={() => setCurrentStep(2)} config={config} setConfig={setConfig} />;
                    case 2:
                        return (
                            <VoiceProfileStep
                                config={config}
                                isRecording={isRecording}
                                recordedSamples={recordedSamples}
                                onStartRecording={startRecording}
                                onStopRecording={stopRecording}
                                onTrain={trainVoiceProfile}
                                onBack={() => setCurrentStep(1)}
                            />
                        );
                    case 3:
                        return (
                            <VoiceSelectionStep
                                config={config}
                                setConfig={setConfig}
                                availableVoices={availableVoices}
                                onPreview={playVoicePreview}
                                onNext={() => setCurrentStep(4)}
                                onBack={() => setCurrentStep(2)}
                            />
                        );
                    case 4:
                        return (
                            <WakeWordStep
                                config={config}
                                setConfig={setConfig}
                                onNext={() => setCurrentStep(5)}
                                onBack={() => setCurrentStep(3)}
                            />
                        );
                    case 5:
                        return (
                            <PluginConfigStep
                                config={config}
                                setConfig={setConfig}
                                onNext={() => setCurrentStep(6)}
                                onBack={() => setCurrentStep(4)}
                            />
                        );
                    case 6:
                        return (
                            <CompletionStep
                                config={config}
                                onFinish={saveConfiguration}
                                onBack={() => setCurrentStep(5)}
                            />
                        );
                    default:
                        return null;
                }
            };

            return (
                <div className="min-h-screen">
                    {/* Progress Bar */}
                    <div className="fixed top-0 left-0 right-0 bg-slate-800/50 backdrop-blur-sm z-50">
                        <div className="max-w-6xl mx-auto px-6 py-4">
                            <div className="flex items-center justify-between mb-2">
                                <h1 className="text-xl font-bold">JARVIS Setup</h1>
                                <span className="text-sm text-slate-400">Step {currentStep} of 6</span>
                            </div>
                            <div className="h-2 bg-slate-700 rounded-full overflow-hidden">
                                <div
                                    className="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-500"
                                    style={{ width: `${(currentStep / 6) * 100}%` }}
                                />
                            </div>
                        </div>
                    </div>

                    {/* Main Content */}
                    <div className="pt-24 pb-12">
                        {renderStep()}
                    </div>
                </div>
            );
        }

        // Step 1: Welcome
        function WelcomeStep({ onNext, config, setConfig }) {
            return (
                <div className="max-w-2xl mx-auto px-6 text-center">
                    <div className="mb-8">
                        <div className="w-24 h-24 bg-gradient-to-br from-blue-500 to-purple-600 rounded-full mx-auto mb-6 flex items-center justify-center">
                            <Zap />
                        </div>
                        <h2 className="text-4xl font-bold mb-4">Welcome to JARVIS</h2>
                        <p className="text-xl text-slate-300">
                            Your personal AI assistant. Let's set up your voice profile and preferences.
                        </p>
                    </div>

                    <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-8 mb-8">
                        <label className="block text-left mb-2 text-slate-300">What should I call you?</label>
                        <input
                            type="text"
                            value={config.userName}
                            onChange={(e) => setConfig({ ...config, userName: e.target.value })}
                            placeholder="Enter your name"
                            className="w-full bg-slate-700 border border-slate-600 rounded-lg px-4 py-3 text-lg focus:outline-none focus:border-blue-500 transition"
                        />
                    </div>

                    <div className="grid grid-cols-3 gap-4 mb-8">
                        <div className="bg-slate-800/30 rounded-xl p-6">
                            <User />
                            <h3 className="font-semibold mb-2">Voice Profile</h3>
                            <p className="text-sm text-slate-400">Train JARVIS to recognize your voice</p>
                        </div>
                        <div className="bg-slate-800/30 rounded-xl p-6">
                            <Volume2 />
                            <h3 className="font-semibold mb-2">Custom Voice</h3>
                            <p className="text-sm text-slate-400">Choose how JARVIS sounds</p>
                        </div>
                        <div className="bg-slate-800/30 rounded-xl p-6">
                            <Shield />
                            <h3 className="font-semibold mb-2">Secure</h3>
                            <p className="text-sm text-slate-400">Your data stays local</p>
                        </div>
                    </div>

                    <button
                        onClick={onNext}
                        disabled={!config.userName}
                        className="bg-gradient-to-r from-blue-500 to-purple-600 px-8 py-4 rounded-lg font-semibold text-lg hover:shadow-lg hover:scale-105 transition disabled:opacity-50 disabled:cursor-not-allowed flex items-center gap-2 mx-auto"
                    >
                        Get Started <ArrowRight />
                    </button>
                </div>
            );
        }

        // Step 2: Voice Profile Creation
        function VoiceProfileStep({ config, isRecording, recordedSamples, onStartRecording, onStopRecording, onTrain, onBack }) {
            const phrases = [
                "Hey JARVIS, what's the weather like today?",
                "JARVIS, play my favorite music",
                "Tell me about the news",
                "What time is it?",
                "Open my calendar"
            ];

            const currentPhrase = phrases[recordedSamples.length] || phrases[0];
            const progress = (recordedSamples.length / phrases.length) * 100;

            return (
                <div className="max-w-3xl mx-auto px-6">
                    <h2 className="text-3xl font-bold mb-3 text-center">Create Your Voice Profile</h2>
                    <p className="text-slate-300 text-center mb-8">
                        Record yourself saying these phrases so JARVIS learns to recognize your voice
                    </p>

                    <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-8 mb-6">
                        <div className="mb-6">
                            <div className="flex justify-between text-sm mb-2">
                                <span className="text-slate-400">Progress</span>
                                <span className="text-blue-400">{recordedSamples.length} / {phrases.length}</span>
                            </div>
                            <div className="h-3 bg-slate-700 rounded-full overflow-hidden">
                                <div
                                    className="h-full bg-gradient-to-r from-blue-500 to-purple-500 transition-all duration-500"
                                    style={{ width: `${progress}%` }}
                                />
                            </div>
                        </div>

                        {recordedSamples.length < phrases.length ? (
                            <>
                                <div className="bg-slate-700/50 rounded-xl p-6 mb-6">
                                    <p className="text-sm text-slate-400 mb-2">Phrase {recordedSamples.length + 1}</p>
                                    <p className="text-xl font-medium">{currentPhrase}</p>
                                </div>

                                <div className="text-center">
                                    <button
                                        onClick={isRecording ? onStopRecording : onStartRecording}
                                        className={`w-32 h-32 rounded-full flex items-center justify-center mx-auto transition-all relative ${
                                            isRecording
                                                ? 'bg-red-500 hover:bg-red-600 shadow-lg shadow-red-500/50 animate-pulse'
                                                : 'bg-gradient-to-br from-blue-500 to-purple-600 hover:shadow-lg hover:scale-105'
                                        }`}
                                    >
                                        <Mic />
                                    </button>
                                    <p className="mt-4 text-slate-400">
                                        {isRecording ? 'Recording... Click to stop' : 'Click to start recording'}
                                    </p>
                                </div>
                            </>
                        ) : (
                            <div className="text-center py-8">
                                <div className="w-16 h-16 bg-green-500 rounded-full flex items-center justify-center mx-auto mb-4">
                                    <Check />
                                </div>
                                <h3 className="text-2xl font-semibold mb-2">All phrases recorded!</h3>
                                <p className="text-slate-300 mb-6">Ready to train your voice profile</p>
                                <button
                                    onClick={onTrain}
                                    className="bg-gradient-to-r from-green-500 to-blue-500 px-8 py-4 rounded-lg font-semibold hover:shadow-lg hover:scale-105 transition"
                                >
                                    Train Voice Profile
                                </button>
                            </div>
                        )}
                    </div>

                    {recordedSamples.length > 0 && (
                        <div className="bg-slate-800/30 rounded-xl p-6 mb-6">
                            <h3 className="font-semibold mb-4">Recorded Samples</h3>
                            <div className="space-y-2">
                                {recordedSamples.map((sample, idx) => (
                                    <div key={idx} className="flex items-center justify-between bg-slate-700/50 rounded-lg p-3">
                                        <div className="flex items-center gap-3">
                                            <div className="w-5 h-5 bg-green-500 rounded-full flex items-center justify-center">
                                                <Check />
                                            </div>
                                            <span>Sample {idx + 1}</span>
                                        </div>
                                        <div className="flex items-center gap-2">
                                            <div className="h-2 w-24 bg-slate-600 rounded-full overflow-hidden">
                                                <div
                                                    className="h-full bg-green-500"
                                                    style={{ width: `${sample.quality * 100}%` }}
                                                />
                                            </div>
                                            <span className="text-sm text-slate-400">{Math.round(sample.quality * 100)}%</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between">
                        <button
                            onClick={onBack}
                            className="flex items-center gap-2 text-slate-400 hover:text-white transition"
                        >
                            <ArrowLeft /> Back
                        </button>
                    </div>
                </div>
            );
        }

        // Step 3: Voice Selection
        function VoiceSelectionStep({ config, setConfig, availableVoices, onPreview, onNext, onBack }) {
            return (
                <div className="max-w-4xl mx-auto px-6">
                    <h2 className="text-3xl font-bold mb-3 text-center">Choose JARVIS's Voice</h2>
                    <p className="text-slate-300 text-center mb-8">
                        Select how you want JARVIS to sound
                    </p>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4 mb-8">
                        {availableVoices.map((voice) => (
                            <div
                                key={voice.id}
                                onClick={() => setConfig({ ...config, jarvisVoice: voice.id })}
                                className={`bg-slate-800/50 backdrop-blur-sm rounded-xl p-6 cursor-pointer transition border-2 ${
                                    config.jarvisVoice === voice.id
                                        ? 'border-blue-500 shadow-lg shadow-blue-500/20'
                                        : 'border-transparent hover:border-slate-600'
                                }`}
                            >
                                <div className="flex items-center justify-between mb-4">
                                    <div>
                                        <h3 className="text-lg font-semibold">{voice.name}</h3>
                                        <p className="text-sm text-slate-400">{voice.language} • {voice.style}</p>
                                    </div>
                                    {config.jarvisVoice === voice.id && (
                                        <div className="w-6 h-6 bg-blue-500 rounded-full flex items-center justify-center">
                                            <Check />
                                        </div>
                                    )}
                                </div>
                                <button
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        onPreview(voice.id);
                                    }}
                                    className="w-full bg-slate-700 hover:bg-slate-600 py-2 rounded-lg flex items-center justify-center gap-2 transition"
                                >
                                    <Volume2 />
                                    Preview
                                </button>
                            </div>
                        ))}
                    </div>

                    <div className="flex justify-between">
                        <button
                            onClick={onBack}
                            className="flex items-center gap-2 text-slate-400 hover:text-white transition"
                        >
                            <ArrowLeft /> Back
                        </button>
                        <button
                            onClick={onNext}
                            className="bg-gradient-to-r from-blue-500 to-purple-600 px-8 py-3 rounded-lg font-semibold hover:shadow-lg hover:scale-105 transition flex items-center gap-2"
                        >
                            Continue <ArrowRight />
                        </button>
                    </div>
                </div>
            );
        }

        // Step 4: Wake Word Setup
        function WakeWordStep({ config, setConfig, onNext, onBack }) {
            return (
                <div className="max-w-2xl mx-auto px-6">
                    <h2 className="text-3xl font-bold mb-3 text-center">Set Wake Word</h2>
                    <p className="text-slate-300 text-center mb-8">
                        Choose what phrase will activate JARVIS
                    </p>

                    <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-8 mb-6">
                        <div className="space-y-4">
                            {['hey jarvis', 'ok jarvis', 'hey computer'].map((phrase) => (
                                <div
                                    key={phrase}
                                    onClick={() => setConfig({ ...config, wakeWord: phrase })}
                                    className={`bg-slate-700/50 rounded-xl p-4 cursor-pointer transition border-2 ${
                                        config.wakeWord === phrase
                                            ? 'border-blue-500'
                                            : 'border-transparent hover:border-slate-600'
                                    }`}
                                >
                                    <div className="flex items-center justify-between">
                                        <span className="text-lg capitalize">{phrase}</span>
                                        {config.wakeWord === phrase && (
                                            <div className="w-5 h-5 bg-blue-500 rounded-full flex items-center justify-center">
                                                <Check />
                                            </div>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>

                        <div className="mt-8">
                            <label className="block text-sm text-slate-400 mb-2">
                                Sensitivity: {Math.round(config.sensitivity * 100)}%
                            </label>
                            <input
                                type="range"
                                min="0"
                                max="1"
                                step="0.1"
                                value={config.sensitivity}
                                onChange={(e) => setConfig({ ...config, sensitivity: parseFloat(e.target.value) })}
                                className="w-full"
                            />
                            <div className="flex justify-between text-xs text-slate-500 mt-1">
                                <span>Less sensitive</span>
                                <span>More sensitive</span>
                            </div>
                        </div>
                    </div>

                    <div className="flex justify-between">
                        <button
                            onClick={onBack}
                            className="flex items-center gap-2 text-slate-400 hover:text-white transition"
                        >
                            <ArrowLeft /> Back
                        </button>
                        <button
                            onClick={onNext}
                            className="bg-gradient-to-r from-blue-500 to-purple-600 px-8 py-3 rounded-lg font-semibold hover:shadow-lg hover:scale-105 transition flex items-center gap-2"
                        >
                            Continue <ArrowRight />
                        </button>
                    </div>
                </div>
            );
        }

        // Step 5: Plugin Configuration
        function PluginConfigStep({ config, setConfig, onNext, onBack }) {
            const plugins = [
                { id: 'spotify', name: 'Spotify', description: 'Music control', icon: '🎵' },
                { id: 'weather', name: 'Weather', description: 'Weather information', icon: '🌤️' },
                { id: 'email', name: 'Email', description: 'Email management', icon: '📧' }
            ];

            const togglePlugin = (pluginId) => {
                setConfig({
                    ...config,
                    plugins: {
                        ...config.plugins,
                        [pluginId]: {
                            ...config.plugins[pluginId],
                            enabled: !config.plugins[pluginId]?.enabled
                        }
                    }
                });
            };

            return (
                <div className="max-w-2xl mx-auto px-6">
                    <h2 className="text-3xl font-bold mb-3 text-center">Configure Plugins</h2>
                    <p className="text-slate-300 text-center mb-8">
                        Enable the features you want to use
                    </p>

                    <div className="space-y-4 mb-8">
                        {plugins.map((plugin) => (
                            <div
                                key={plugin.id}
                                className="bg-slate-800/50 backdrop-blur-sm rounded-xl p-6 flex items-center justify-between"
                            >
                                <div className="flex items-center gap-4">
                                    <div className="text-4xl">{plugin.icon}</div>
                                    <div>
                                        <h3 className="text-lg font-semibold">{plugin.name}</h3>
                                        <p className="text-sm text-slate-400">{plugin.description}</p>
                                    </div>
                                </div>
                                <label className="relative inline-block w-14 h-8">
                                    <input
                                        type="checkbox"
                                        checked={config.plugins[plugin.id]?.enabled || false}
                                        onChange={() => togglePlugin(plugin.id)}
                                        className="sr-only peer"
                                    />
                                    <div className="w-14 h-8 bg-slate-600 rounded-full peer-checked:bg-blue-500 transition cursor-pointer"></div>
                                    <div className="absolute left-1 top-1 w-6 h-6 bg-white rounded-full transition peer-checked:translate-x-6"></div>
                                </label>
                            </div>
                        ))}
                    </div>

                    <div className="flex justify-between">
                        <button
                            onClick={onBack}
                            className="flex items-center gap-2 text-slate-400 hover:text-white transition"
                        >
                            <ArrowLeft /> Back
                        </button>
                        <button
                            onClick={onNext}
                            className="bg-gradient-to-r from-blue-500 to-purple-600 px-8 py-3 rounded-lg font-semibold hover:shadow-lg hover:scale-105 transition flex items-center gap-2"
                        >
                            Continue <ArrowRight />
                        </button>
                    </div>
                </div>
            );
        }

        // Step 6: Completion
        function CompletionStep({ config, onFinish, onBack }) {
            return (
                <div className="max-w-2xl mx-auto px-6 text-center">
                    <div className="mb-8">
                        <div className="w-24 h-24 bg-gradient-to-br from-green-500 to-blue-600 rounded-full mx-auto mb-6 flex items-center justify-center">
                            <Check />
                        </div>
                        <h2 className="text-4xl font-bold mb-4">Setup Complete!</h2>
                        <p className="text-xl text-slate-300">
                            JARVIS is ready to assist you, {config.userName}
                        </p>
                    </div>

                    <div className="bg-slate-800/50 backdrop-blur-sm rounded-2xl p-8 mb-8 text-left">
                        <h3 className="font-semibold mb-4">Your Configuration</h3>
                        <div className="space-y-3 text-slate-300">
                            <div className="flex justify-between">
                                <span>Voice Profile:</span>
                                <span className="text-blue-400">✓ Trained</span>
                            </div>
                            <div className="flex justify-between">
                                <span>JARVIS Voice:</span>
                                <span className="text-blue-400">{config.jarvisVoice}</span>
                            </div>
                            <div className="flex justify-between">
                                <span>Wake Word:</span>
                                <span className="text-blue-400">{config.wakeWord}</span>
                            </div>
                            <div className="flex justify-between">
                                <span>Active Plugins:</span>
                                <span className="text-blue-400">
                                    {Object.values(config.plugins).filter(p => p.enabled).length}
                                </span>
                            </div>
                        </div>
                    </div>

                    <div className="space-y-4">
                        <button
                            onClick={onFinish}
                            className="w-full bg-gradient-to-r from-green-500 to-blue-500 px-8 py-4 rounded-lg font-semibold text-lg hover:shadow-lg hover:scale-105 transition"
                        >
                            Launch JARVIS
                        </button>
                        <button
                            onClick={onBack}
                            className="flex items-center gap-2 text-slate-400 hover:text-white transition mx-auto"
                        >
                            <ArrowLeft /> Back to review
                        </button>
                    </div>
                </div>
            );
        }

        // Render the app
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<OnboardingUI />);
    </script>
</body>
</html>
